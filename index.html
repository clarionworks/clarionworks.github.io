<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Clarionworks</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin=""/>
    <style>
      :root {
        /* Blue and Yellow color scheme */
        --bg: #1a2b4c;  /* Dark blue background */
        --panel: rgba(10, 18, 39, 0.92);  /* Slightly darker panel for depth */
        --panel-2: rgba(25, 35, 65, 0.92);
        --line: rgba(255, 215, 0, 0.35); /* Light yellow for borders */
        --text: #ffffff;  /* White text for contrast */
        --muted: #a1b2d1;  /* Light blue-gray muted text */
        --accent: #007bff;  /* Blue color for primary elements */
        --accent-2: #0056b3;  /* Darker blue for secondary elements */
        --danger: #ff4c4c; /* Red for errors */
        --success: #28a745; /* Green for success */
        --shadow: 0 18px 60px rgba(0, 0, 0, 0.45);
        --radius: 18px;
      }

      * { box-sizing: border-box; }

      html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        font-family: Inter, Arial, Helvetica, sans-serif;
        background: var(--bg);
        color: var(--text);
        overflow: hidden;
      }

      body::before {
        content: "";
        position: fixed;
        inset: 0;
        background:
          radial-gradient(circle at top left, rgba(255,215,0,0.10), transparent 22%),
          radial-gradient(circle at bottom right, rgba(255,215,0,0.08), transparent 18%),
          linear-gradient(180deg, #020610 0%, #06101d 100%);
        pointer-events: none;
        z-index: 0;
      }

      .app-shell {
        position: relative;
        z-index: 1;
        display: none;
        grid-template-columns: 370px 1fr;
        height: 100vh;
        gap: 14px;
        padding: 14px;
      }

      .app-shell.active {
        display: grid;
      }

      .panel {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: var(--radius);
        box-shadow: var(--shadow);
        backdrop-filter: blur(12px);
      }

      .sidebar {
        display: grid;
        grid-template-rows: auto auto auto 1fr auto;
        gap: 12px;
        padding: 16px;
        overflow: auto;
      }

      .brand {
        padding: 14px 16px;
        background: linear-gradient(180deg, rgba(13,31,59,0.96), rgba(6,16,31,0.96));
      }

      .eyebrow {
        color: var(--accent);
        font-size: 11px;
        letter-spacing: 0.28em;
        text-transform: uppercase;
        margin-bottom: 8px;
      }

      .brand h1 {
        margin: 0;
        font-size: 24px;
        line-height: 1.1;
        font-weight: 800;
      }

      .brand p {
        margin: 10px 0 0;
        color: var(--muted);
        font-size: 13px;
        line-height: 1.5;
      }

      .section {
        padding: 14px;
        background: var(--panel-2);
      }

      .section-title {
        font-size: 12px;
        text-transform: uppercase;
        letter-spacing: 0.22em;
        color: var(--accent);
        margin: 0 0 10px;
      }

      label {
        display: block;
        font-size: 12px;
        color: var(--muted);
        margin: 10px 0 6px;
      }

      input {
        width: 100%;
        border: 1px solid rgba(255,215,0,0.18);
        background: rgba(0,0,0,0.28);
        color: var(--text);
        border-radius: 12px;
        padding: 12px 14px;
        outline: none;
        transition: 0.2s ease;
        font-size: 14px;
      }

      input:focus {
        border-color: rgba(255,215,0,0.55);
        box-shadow: 0 0 0 4px rgba(255,215,0,0.08);
      }

      .row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
      }

      button {
        width: 100%;
        border: 0;
        border-radius: 12px;
        padding: 12px 14px;
        cursor: pointer;
        font-weight: 700;
        font-size: 14px;
        transition: transform 0.15s ease, opacity 0.15s ease;
      }

      button:hover { transform: translateY(-1px); }
      button:active { transform: translateY(0); }

      .primary {
        background: linear-gradient(180deg, var(--accent), var(--accent-2));
        color: #07111f;
      }

      .secondary {
        background: rgba(255,255,255,0.06);
        color: var(--text);
        border: 1px solid rgba(255,215,0,0.15);
      }

      .map-wrap {
        position: relative;
        overflow: hidden;
        min-height: 0;
      }

      #map {
        width: 100%;
        height: 100%;
        border-radius: var(--radius);
        overflow: hidden;
      }

      .status {
        min-height: 18px;
        font-size: 13px;
        color: var(--muted);
        margin-top: 10px;
      }

      .status.error { color: var(--danger); }
      .status.success { color: var(--success); }

      .result-box {
        background: rgba(0,0,0,0.22);
        border: 1px solid rgba(255,215,0,0.14);
        border-radius: 14px;
        padding: 12px;
        margin-top: 10px;
      }

      .result-box strong {
        display: block;
        font-size: 12px;
        letter-spacing: 0.12em;
        color: var(--accent);
        text-transform: uppercase;
        margin-bottom: 8px;
      }

      .result-box .value {
        font-size: 14px;
        color: var(--text);
        line-height: 1.5;
        word-break: break-word;
      }

      .footer-note {
        font-size: 12px;
        color: var(--muted);
        line-height: 1.5;
        padding: 2px 2px 0;
      }

      .login-overlay {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        align-items: center;
        justify-content: center;
        background:
          radial-gradient(circle at center, rgba(255,215,0,0.08), transparent 20%),
          linear-gradient(180deg, rgba(2,6,16,0.92), rgba(4,10,18,0.98));
        transition: opacity 0.35s ease, visibility 0.35s ease;
      }

      .login-overlay.hidden {
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
      }

      .login-card {
        width: min(460px, calc(100vw - 32px));
        padding: 26px;
        border-radius: 24px;
        background: linear-gradient(180deg, rgba(8,20,39,0.97), rgba(5,12,23,0.97));
        border: 1px solid rgba(255,215,0,0.22);
        box-shadow: 0 30px 80px rgba(0,0,0,0.6);
      }

      .login-title {
        margin: 0 0 8px;
        font-size: 28px;
        font-weight: 900;
        letter-spacing: 0.02em;
      }

      .login-sub {
        margin: 0 0 18px;
        color: var(--muted);
        line-height: 1.55;
        font-size: 14px;
      }

      .tiny {
        font-size: 11px;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: var(--accent);
        margin-bottom: 10px;
      }

      .pill {
        position: absolute;
        top: 16px;
        right: 16px;
        z-index: 500;
        background: rgba(7,17,31,0.92);
        color: var(--text);
        border: 1px solid rgba(255,215,0,0.18);
        border-radius: 999px;
        padding: 8px 12px;
        font-size: 12px;
        box-shadow: var(--shadow);
        backdrop-filter: blur(8px);
      }

      .continent-label {
        background: transparent;
        border: 0;
        box-shadow: none;
        color: rgba(255,255,255,0.88);
        font-size: 13px;
        font-weight: 700;
        text-shadow: 0 2px 8px rgba(0,0,0,0.9);
      }

      .leaflet-control-zoom a {
        background: rgba(7,17,31,0.88) !important;
        color: var(--text) !important;
        border-bottom-color: rgba(255,215,0,0.15) !important;
      }

      .leaflet-popup-content-wrapper,
      .leaflet-popup-tip {
        background: #081426;
        color: var(--text);
        border: 1px solid rgba(255,215,0,0.18);
      }

      @media (max-width: 960px) {
        .app-shell {
          grid-template-columns: 1fr;
          grid-template-rows: auto 1fr;
        }

        .sidebar {
          max-height: 48vh;
        }
      }
    </style>
  </head>
  <body>
    <!-- Login and App Content -->
    <div class="login-overlay" id="loginOverlay">
      <div class="login-card panel">
        <div class="tiny">Clarionworks</div>
        <h2 class="login-title">Welcome to Clarionworks</h2>
        <p class="login-sub">Explore our site and see what we have to offer.</p>

        <label for="loginUser">Username</label>
        <input id="loginUser" type="text" placeholder="Enter username" autocomplete="off" />

        <label for="loginPass">Password</label>
        <input id="loginPass" type="password" placeholder="Enter password" autocomplete="off" />

        <div class="row" style="margin-top:14px;">
          <button class="primary" id="loginBtn">Access Interface</button>
          <button class="secondary" id="demoBtn">Demo Access</button>
        </div>

        <div class="status" id="loginStatus"></div>
      </div>
    </div>

    <div class="app-shell" id="appShell">
      <aside class="sidebar panel">
        <section class="brand panel">
          <div class="eyebrow">Clarionworks</div>
          <h1>Explore Our Projects</h1>
          <p>Learn more about our innovative projects and solutions.</p>
        </section>

        <section class="section panel">
          <h3 class="section-title">Search Projects</h3>
          <label for="projectSearch">Search for projects or ideas</label>
          <input id="projectSearch" type="text" placeholder="Search..." />
          <div class="row" style="margin-top:10px;">
            <button class="primary" id="searchBtn">Search</button>
            <button class="secondary" id="clearSearchBtn">Clear</button>
          </div>
          <div class="status" id="searchStatus"></div>
        </section>
      </aside>

      <main class="map-wrap panel">
        <div class="pill" id="liveBanner">System online</div>
        <div id="map"></div>
      </main>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
    <script>
      // JavaScript for handling search, geolocation, and map interactions
    </script>
  </body>
</html>
